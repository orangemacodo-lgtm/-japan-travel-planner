<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>日本旅遊規劃師 — AI 自動行程生成</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #0284c7; --sky2: #0ea5e9; --sky1: #e0f2fe; --sky0: #f0f9ff;
  --grn: #059669; --grn2: #10b981; --grn1: #d1fae5;
  --fg: #0f172a; --fg2: #334155; --fg3: #64748b; --fg4: #94a3b8;
  --bg: #f8fafc; --white: #fff; --bdr: #e2e8f0; --bdr2: #cbd5e1;
  --red: #dc2626; --amber: #d97706; --amberbg: #fffbeb;
  --font: 'Zen Maru Gothic', -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  --mono: 'Courier New', monospace;
  --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--fg); min-height: 100vh; -webkit-tap-highlight-color: transparent; }
input, select, textarea, button { font-family: var(--font); }
::selection { background: var(--sky1); color: var(--sky); }

/* Header */
.header { background: var(--white); border-bottom: 1px solid var(--bdr); position: sticky; top: 0; z-index: 50; }
.header-inner { max-width: 960px; margin: 0 auto; padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; border: none; background: none; }
.logo-badge { background: var(--sky); color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 14px; letter-spacing: 1px; }
.logo-text { font-weight: 800; font-size: 17px; color: var(--fg); }
.header-btn { font-size: 13px; color: var(--fg3); background: none; border: none; cursor: pointer; font-weight: 600; }
.header-btn:hover { color: var(--sky); }

/* Container */
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

/* Hero */
.hero { text-align: center; padding: 20px 0 32px; animation: fadeUp .6s ease; }
.hero h1 { font-size: 30px; font-weight: 900; color: var(--fg); margin-bottom: 10px; }
.hero p { font-size: 15px; color: var(--fg3); line-height: 1.7; }

/* Form Card */
.form-card { max-width: 640px; margin: 0 auto; background: var(--white); border-radius: 18px; box-shadow: 0 4px 32px rgba(0,0,0,.06); border: 1px solid var(--bdr); overflow: hidden; animation: fadeUp .6s ease .1s both; }
.form-header { padding: 24px 28px; color: #fff; transition: background .3s; }
.form-header.car { background: linear-gradient(135deg, var(--sky), var(--sky2)); }
.form-header.public { background: linear-gradient(135deg, var(--grn), var(--grn2)); }
.form-header h2 { font-size: 21px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
.form-header p { margin-top: 5px; font-size: 13px; opacity: .8; }
.form-body { padding: 24px 28px; }

/* Section */
.section { margin-bottom: 28px; }
.sec-title { font-size: 11px; font-weight: 700; color: var(--fg3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--bdr); }

/* Inputs */
.field-label { font-size: 13px; font-weight: 500; color: var(--fg2); margin-bottom: 4px; display: block; }
.field-sub { font-size: 11px; color: var(--fg4); margin-top: 3px; }
.inp, .sel, .txta {
  width: 100%; border: 1px solid var(--bdr2); border-radius: 10px;
  padding: 10px 12px; font-size: 14px; background: var(--white); color: var(--fg);
  transition: border-color .15s;
}
.inp:focus, .sel:focus, .txta:focus { outline: none; border-color: var(--sky); box-shadow: 0 0 0 3px rgba(2,132,199,.1); }
.txta { resize: none; height: 60px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; }
.col { flex: 1; min-width: 140px; }

/* Flight Box */
.flight-box { background: var(--bg); border: 1px solid var(--bdr); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.flight-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.flight-label.arr { color: var(--sky); }
.flight-label.dep { color: #c2410c; }

/* Time Selector */
.time-row { display: flex; gap: 4px; align-items: center; }
.time-sel { flex: 1; padding: 8px 4px; border: 1px solid var(--bdr2); border-radius: 8px; font-size: 13px; text-align: center; background: var(--white); }
.time-colon { color: var(--fg4); font-weight: 700; }

/* Transport Toggle */
.transport-row { display: flex; gap: 12px; }
.transport-btn {
  flex: 1; padding: 16px 12px; border-radius: 14px; border: 2px solid var(--bdr);
  background: var(--white); cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 6px; transition: all .2s; color: var(--fg4);
}
.transport-btn:hover { border-color: var(--bdr2); }
.transport-btn.on-car { border-color: var(--sky); background: var(--sky0); color: var(--sky); box-shadow: 0 2px 8px rgba(2,132,199,.12); }
.transport-btn.on-pub { border-color: var(--grn); background: var(--grn1); color: var(--grn); box-shadow: 0 2px 8px rgba(5,150,105,.12); }
.transport-icon { font-size: 28px; }
.transport-label { font-weight: 700; font-size: 13px; }

/* Interest Chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--bdr); background: var(--white);
  color: var(--fg3); transition: all .15s; user-select: none;
}
.chip:hover { border-color: var(--sky); color: var(--sky); }
.chip.on { background: var(--sky); color: #fff; border-color: var(--sky); box-shadow: 0 1px 4px rgba(2,132,199,.25); }
.chip.on-g { background: var(--grn); color: #fff; border-color: var(--grn); }

/* Checkbox */
.check-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--fg2); cursor: pointer; }
.check-row input { accent-color: var(--sky); }

/* Submit */
.submit-btn {
  width: 100%; padding: 16px; border-radius: 14px; border: none; color: #fff;
  font-size: 17px; font-weight: 800; cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 16px rgba(2,132,199,.25);
}
.submit-btn.car { background: linear-gradient(135deg, var(--sky), var(--sky2)); }
.submit-btn.public { background: linear-gradient(135deg, var(--grn), var(--grn2)); }
.submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(2,132,199,.3); }
.submit-btn:active { transform: scale(.99); }
.submit-btn:disabled { background: var(--fg4); cursor: not-allowed; transform: none; box-shadow: none; }

/* Loading Overlay */
.loading-overlay {
  position: fixed; inset: 0; z-index: 100; background: rgba(255,255,255,.93);
  backdrop-filter: blur(10px); display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.spinner-wrap { position: relative; width: 80px; height: 80px; margin-bottom: 24px; }
.spinner { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--sky1); border-top-color: var(--sky); animation: spin 1s linear infinite; }
.spinner-emoji { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.loading-msg { font-size: 18px; font-weight: 700; color: var(--fg); margin-bottom: 6px; }
.loading-sub { font-size: 13px; color: var(--fg3); }
.loading-bar { width: 200px; height: 5px; background: var(--bdr); border-radius: 3px; overflow: hidden; margin-top: 20px; }
.loading-bar-inner { height: 100%; width: 0%; background: linear-gradient(90deg, var(--sky), var(--sky2)); border-radius: 3px; animation: progress 35s ease-out forwards; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes progress { 0%{width:0} 30%{width:50%} 70%{width:80%} 100%{width:95%} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* Error */
.error-box { max-width: 640px; margin: 0 auto 20px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 14px 18px; font-size: 13px; color: var(--red); display: flex; gap: 10px; align-items: flex-start; animation: fadeUp .3s ease; }

/* Result */
.result-hero {
  background: linear-gradient(135deg, var(--sky), var(--sky2), var(--grn));
  border-radius: 18px; padding: 24px 28px; color: #fff; margin-bottom: 20px;
  box-shadow: 0 4px 24px rgba(2,132,199,.18); animation: fadeUp .5s ease;
}
.result-hero h1 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
.result-hero p { font-size: 13px; opacity: .85; line-height: 1.6; }
.result-hero-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.result-hero-btn { background: rgba(255,255,255,.2); border: none; border-radius: 8px; padding: 6px 14px; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; backdrop-filter: blur(4px); }
.result-hero-btn:hover { background: rgba(255,255,255,.3); }
.result-tags { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.result-tag { background: rgba(255,255,255,.2); border-radius: 20px; padding: 4px 14px; font-size: 11px; font-weight: 600; }

/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab-btn {
  padding: 8px 20px; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 1px solid var(--bdr); background: var(--white); color: var(--fg3);
  transition: all .15s;
}
.tab-btn.on { background: var(--sky); color: #fff; border-color: var(--sky); box-shadow: 0 2px 8px rgba(2,132,199,.2); }

/* Day Card */
.day-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--bdr); overflow: hidden; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.03); animation: fadeUp .4s ease both; }
.day-header {
  width: 100%; padding: 14px 18px; display: flex; align-items: center; gap: 14px;
  border: none; cursor: pointer; text-align: left; background: var(--white);
  transition: background .15s;
}
.day-header:hover { background: var(--sky0); }
.day-header.open { background: var(--sky0); }
.day-num {
  width: 48px; height: 48px; border-radius: 12px;
  background: linear-gradient(135deg, var(--sky), var(--sky2));
  color: #fff; display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(2,132,199,.25);
}
.day-num-label { font-size: 9px; font-weight: 800; opacity: .8; }
.day-num-val { font-size: 20px; font-weight: 900; line-height: 1; }
.day-info { flex: 1; min-width: 0; }
.day-theme { font-weight: 700; font-size: 14px; color: var(--fg); }
.day-meta { font-size: 11px; color: var(--fg3); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.day-arrow { color: var(--fg4); font-size: 12px; transition: transform .2s; }
.day-arrow.open { transform: rotate(180deg); }

/* Activity Timeline */
.act-list { border-top: 1px solid var(--bdr); }
.act-item { display: flex; gap: 14px; padding: 12px 18px; border-bottom: 1px solid #f1f5f9; transition: background .1s; }
.act-item:last-child { border-bottom: none; }
.act-item:hover { background: rgba(2,132,199,.02); }
.act-timeline { display: flex; flex-direction: column; align-items: center; width: 50px; flex-shrink: 0; }
.act-time { font-size: 11px; font-weight: 700; color: var(--sky); font-family: var(--mono); }
.act-icon { width: 32px; height: 32px; border-radius: 10px; background: var(--sky1); display: flex; align-items: center; justify-content: center; margin-top: 4px; font-size: 16px; }
.act-line { flex: 1; width: 1px; background: #bae6fd; margin-top: 4px; min-height: 12px; }
.act-content { flex: 1; min-width: 0; padding-bottom: 4px; }
.act-name { font-weight: 700; font-size: 14px; color: var(--fg); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.act-ticket { font-size: 10px; background: #fef3c7; color: #92400e; border-radius: 6px; padding: 2px 8px; font-weight: 700; }
.act-desc { font-size: 12px; color: var(--fg3); margin-top: 3px; }
.act-highlights { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.act-hl { background: var(--sky0); color: #0369a1; font-size: 10px; padding: 2px 8px; border-radius: 12px; border: 1px solid #bae6fd; }
.act-travel { margin-top: 8px; background: var(--bg); border-radius: 8px; padding: 5px 10px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--fg3); }
.act-travel b { font-weight: 600; }

/* Advice & Packing */
.info-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--bdr); padding: 20px; margin-bottom: 16px; animation: fadeUp .4s ease; }
.info-card h3 { font-size: 15px; font-weight: 700; color: var(--fg); margin-bottom: 12px; }
.advice-item { display: flex; gap: 10px; font-size: 13px; color: var(--fg2); margin-bottom: 8px; }
.advice-num { color: var(--sky); font-weight: 700; flex-shrink: 0; }
.pack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.pack-cat { background: var(--bg); border-radius: 10px; padding: 12px; }
.pack-cat-title { font-weight: 700; font-size: 13px; color: var(--fg2); margin-bottom: 8px; }
.pack-items { display: flex; flex-wrap: wrap; gap: 4px; }
.pack-item { background: var(--white); border: 1px solid var(--bdr); border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--fg3); }

/* Currency Widget */
.currency-box { background: var(--amberbg); border: 1px solid #fde68a; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.currency-title { font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 10px; }
.currency-row { display: flex; gap: 12px; align-items: flex-end; }
.currency-col { flex: 1; }
.currency-label { font-size: 11px; color: var(--fg3); margin-bottom: 4px; }
.currency-inp { width: 100%; border: 1px solid var(--bdr2); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: var(--mono); }
.currency-result { background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: var(--mono); font-weight: 700; color: #92400e; }
.currency-arrow { font-size: 20px; color: var(--fg4); padding-bottom: 6px; }
.currency-rate { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: var(--fg3); }
.currency-rate input { border: 1px solid var(--bdr2); border-radius: 6px; padding: 4px 8px; font-size: 12px; width: 70px; font-family: var(--mono); }

/* Activity Edit Controls */
.act-del {
  position: absolute; top: 6px; right: 6px; width: 24px; height: 24px;
  border-radius: 50%; border: none; background: #fef2f2; color: #dc2626;
  font-size: 12px; cursor: pointer; opacity: 0; transition: opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.act-move {
  position: absolute; top: 6px; right: 34px; display: flex; gap: 2px;
  opacity: 0; transition: opacity .15s;
}
.act-move-btn {
  width: 22px; height: 22px; border-radius: 6px; border: 1px solid #e2e8f0;
  background: #f8fafc; color: #64748b; font-size: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .12s;
}
.act-move-btn:hover { background: #e0f2fe; color: #0284c7; border-color: #bae6fd; }
.act-move-btn:disabled { opacity: .25; cursor: not-allowed; }
.act-item { position: relative; }
.act-item:hover .act-del, .act-item:hover .act-move { opacity: 1; }
.act-stay {
  display: inline-flex; align-items: center; gap: 3px; margin-left: 6px;
  font-size: 10px; color: #0369a1; background: #e0f2fe; border: 1px solid #bae6fd;
  border-radius: 6px; padding: 1px 7px; font-weight: 600;
}
.act-add-row {
  padding: 8px 18px 14px; display: flex; justify-content: center;
}
.act-add-btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 20px;
  border-radius: 10px; border: 2px dashed #94a3b8; background: transparent;
  color: #64748b; font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all .15s; font-family: var(--font);
}
.act-add-btn:hover { border-color: #0284c7; color: #0284c7; background: #f0f9ff; }

/* Suggestion Modal */
.sug-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center;
}
.sug-panel {
  background: var(--white); border-radius: 18px 18px 0 0; width: 100%; max-width: 560px;
  max-height: 85vh; overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0,0,0,.15); animation: slideUp .3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sug-header {
  padding: 16px 20px; border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
}
.sug-header h3 { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.sug-close { background: var(--bg); border: 1px solid var(--bdr); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.sug-tabs { display: flex; gap: 6px; padding: 12px 20px; border-bottom: 1px solid var(--bdr); overflow-x: auto; }
.sug-tab {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  cursor: pointer; border: 1px solid var(--bdr); background: var(--white); color: var(--fg3);
  white-space: nowrap; transition: all .15s;
}
.sug-tab.on { background: var(--sky); color: #fff; border-color: var(--sky); }
.sug-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.sug-card {
  border: 1px solid var(--bdr); border-radius: 12px; padding: 14px; margin-bottom: 10px;
  cursor: pointer; transition: all .15s;
}
.sug-card:hover { border-color: var(--sky); background: var(--sky0); }
.sug-card-name { font-size: 14px; font-weight: 700; color: var(--fg); margin-bottom: 4px; }
.sug-card-desc { font-size: 12px; color: var(--fg3); margin-bottom: 6px; }
.sug-card-ig { font-size: 12px; color: #6b21a8; background: #faf5ff; border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; line-height: 1.5; }
.sug-card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.sug-card-tag { font-size: 10px; background: var(--sky0); color: #0369a1; border: 1px solid #bae6fd; border-radius: 8px; padding: 2px 8px; }
.sug-loading { text-align: center; padding: 40px; color: var(--fg3); font-size: 13px; }
.sug-manual { border-top: 1px solid var(--bdr); padding: 14px 20px; background: var(--bg); }
.sug-manual-title { font-size: 11px; font-weight: 700; color: var(--fg3); margin-bottom: 8px; }
.sug-manual-row { display: flex; gap: 6px; }
.sug-manual-inp { flex: 1; border: 1px solid var(--bdr2); border-radius: 8px; padding: 8px 10px; font-size: 13px; }
.sug-manual-inp:focus { outline: none; border-color: var(--sky); }
.sug-manual-btn { background: var(--sky); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 700; cursor: pointer; font-size: 13px; }

/* Expense Tracker */
.exp-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 80;
  width: 56px; height: 56px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #059669, #10b981); color: #fff;
  font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(5,150,105,.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s, box-shadow .2s;
}
.exp-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(5,150,105,.5); }
.exp-fab:active { transform: scale(.95); }
.exp-fab-badge {
  position: absolute; top: -4px; right: -4px; min-width: 20px; height: 20px;
  border-radius: 10px; background: #ef4444; color: #fff; font-size: 10px;
  font-weight: 800; display: flex; align-items: center; justify-content: center;
  padding: 0 5px; box-shadow: 0 2px 6px rgba(239,68,68,.4);
}
.exp-overlay {
  position: fixed; inset: 0; z-index: 90; background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .25s;
}
.exp-overlay.open { opacity: 1; pointer-events: all; }
.exp-panel {
  position: fixed; bottom: 0; right: 0; z-index: 100;
  width: min(420px, 100vw); max-height: 85vh;
  background: var(--white); border-radius: 18px 18px 0 0; border: 1px solid var(--bdr);
  box-shadow: 0 -8px 40px rgba(0,0,0,.12); overflow: hidden;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1.1,.6,1);
  display: flex; flex-direction: column;
}
.exp-panel.open { transform: translateY(0); }
.exp-header {
  padding: 16px 20px; border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(135deg, #059669, #10b981); color: #fff;
}
.exp-header h3 { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }

<body>

  <!-- Home View -->
  <div id="home-view">
    <div class="hero">
      <h1>🗾 規劃你的日本之旅</h1>

      <div class="form-body">

        <!-- 旅遊資訊 -->
        <div class="section">
          <div class="sec-title">🌏 旅遊資訊</div>
          <div style="margin-bottom:12px">

          <!-- Arrival -->
          <div class="flight-box">

            <div class="row">

                <div class="time-row">

            <div class="flight-label dep">🛫 回程（離開日本）</div>
            <div class="row">
              <div class="col"><label class="field-sub">日期</label><input type="date" class="inp" id="f-end" value="2026-05-07"></div>
              <div style="width:170px"><label class="field-sub">起飛時間</label>
                <div class="time-row">

        <!-- 交通方式 -->

            <div class="col"><label class="field-sub">小孩</label><input type="number" class="inp" id="f-kids" value="0" min="0" max="10"></div>
          </div>
          <input type="text" class="inp" id="f-members" placeholder="成員描述：例如 藥師夫婦、高中生、喜歡攝影..." style="margin-bottom:8px">
          <textarea class="txta" id="f-requests" placeholder="特殊需求：例如 想去環球影城、有長輩需要慢節奏..."></textarea>
          <div class="field-sub">AI 將盡力將特定需求排入行程中</div>

        <!-- 偏好 -->
        <div class="section">

  <!-- Result View -->

<footer class="footer">Japan Travel Planner · AI 生成行程僅供參考，請依實際狀況調整</footer>

<!-- 記帳浮動按鈕 -->

  💰
  <span class="exp-fab-badge" id="exp-badge" style="display:none">0</span>
</button>

<!-- 記帳面板 -->
<div class="exp-overlay" id="exp-overlay" onclick="toggleExpPanel()"></div>
<div class="exp-panel" id="exp-panel">
  <div class="exp-header">
    <h3>💰 旅遊記帳</h3>
    <button class="exp-close" onclick="toggleExpPanel()">✕</button>
  </div>
  <div class="exp-body">
    <!-- 總計 -->
    <div class="exp-total">
      <div>
        <div class="exp-total-label">旅行總花費</div>
        <div class="exp-total-val" id="exp-total-jpy">¥0</div>
      </div>
      <div style="text-align:right">
        <div class="exp-total-label">換算台幣</div>
        <div class="exp-total-sub" id="exp-total-twd">≈ NT$0</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:4px;justify-content:flex-end;flex-wrap:wrap">
          <span style="font-size:10px;color:#64748b">匯率</span>
          <input type="number" step="0.001" value="0.21" id="exp-rate" oninput="renderExpenses()"
            style="width:55px;border:1px solid #bbf7d0;border-radius:5px;padding:2px 5px;font-size:11px;font-family:var(--mono);text-align:center">
          <button onclick="refreshRateExp(this)" style="background:#059669;color:#fff;border:none;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap">🔄 最新</button>
        </div>

    <!-- 新增表單 -->

      <div class="exp-form-row">
        <input type="number" class="exp-inp" id="exp-amount" placeholder="金額（日幣）" min="0"
          onkeydown="if(event.key==='Enter')addExpense()">
        <select class="exp-sel" id="exp-cat">
          <option value="food">🍱 餐飲</option>
          <option value="transport">🚄 交通</option>
          <option value="shopping">🛍️ 購物</option>
          <option value="hotel">🏨 住宿</option>
          <option value="ticket">🎫 門票</option>
          <option value="other">📦 其他</option>
        </select>
      </div>

          onkeydown="if(event.key==='Enter')addExpense()">
        <button class="exp-add-btn" onclick="addExpense()" id="exp-add-btn">＋</button>

    <!-- 清單 -->

<script>
// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
let transport = 'car';
let selectedInterests = new Set(['美食/和牛/海鮮', '神社/寺廟']);
let plan = null;
let isLoading = false;

const INTERESTS = [
  '自駕風景','溫泉','美食/和牛/海鮮','滑雪/雪景','歷史文化',
  '神社/寺廟','購物','主題樂園','大自然','動漫周邊',
  '花火景點','當季景點/櫻花','攝影打卡','親子活動',
];
const ICONS = {FOOD:'🍱',SIGHTSEEING:'⛩️',ACTIVITY:'🎯',HOTEL:'🏨',DRIVE:'🚗',SHOPPING:'🛍️'};
const WX = {sunny:'☀️',cloudy:'⛅',rainy:'🌧️',snowy:'❄️'};
const REGIONS = {
  all:'全日本',hokkaido:'北海道',tohoku:'東北',kanto:'關東/東京',
  chubu:'中部/北陸',kansai:'關西/大阪',chugoku:'中國/四國',kyushu:'九州',okinawa:'沖繩'
};
const MSGS = ['正在研究最佳路線... 🗾','搜尋隱藏版美食... 🍱','計算交通方案... 🚄','安排精彩行程... 📋','加入在地秘境... ✨','最終優化中... 🎌'];

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
(function init() {
  // Time selectors
  const arrH = document.getElementById('f-arr-h');
  const arrM = document.getElementById('f-arr-m');
  const depH = document.getElementById('f-dep-h');
  const depM = document.getElementById('f-dep-m');
  for (let i = 0; i < 24; i++) {
    const opt = v => { const o = document.createElement('option'); o.value = o.textContent = String(v).padStart(2,'0'); return o; };
    arrH.appendChild(opt(i)); depH.appendChild(opt(i));
  }
  ['00','10','15','20','30','40','45','50'].forEach(m => {
    const o1 = document.createElement('option'); o1.value = o1.textContent = m; arrM.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = o2.textContent = m; depM.appendChild(o2);
  });
  arrH.value = '14'; depH.value = '11';
  renderChips();
})();

// ═══════════════════════════════════════════════════════════════
// UI Helpers
// ═══════════════════════════════════════════════════════════════
function renderChips() {
  const wrap = document.getElementById('chips-wrap');
  wrap.innerHTML = INTERESTS
    .filter(i => !(i.includes('自駕') && transport === 'public'))
    .map(i => {
      const on = selectedInterests.has(i);
      const cls = on ? (transport==='car' ? 'chip on' : 'chip on-g') : 'chip';
      return `<div class="${cls}" onclick="toggleInterest('${i}')">${i}</div>`;
    }).join('');
}

function toggleInterest(i) {
  selectedInterests.has(i) ? selectedInterests.delete(i) : selectedInterests.add(i);
  renderChips();
}

function setTransport(mode) {
  transport = mode;
  const car = mode === 'car';
  document.getElementById('t-car').className = `transport-btn ${car ? 'on-car' : ''}`;
  document.getElementById('t-pub').className = `transport-btn ${car ? '' : 'on-pub'}`;
  document.getElementById('form-header').className = `form-header ${mode}`;
  document.getElementById('form-title').innerHTML = car ? '🚗 日本自駕行程規劃' : '🚄 日本自由行規劃';
  document.getElementById('submit-btn').className = `submit-btn ${mode}`;
  if (mode === 'public') selectedInterests.delete('自駕風景');
  renderChips();
}

function showHome() {
  document.getElementById('home-view').style.display = '';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
}

function showResult() {
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('result-view').style.display = '';
  document.getElementById('back-btn').style.display = '';
}

// ═══════════════════════════════════════════════════════════════
// Generate
// ═══════════════════════════════════════════════════════════════
async function generate() {
  if (isLoading) return;
  isLoading = true;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '⏳ AI 正在規劃行程...<br><span style="font-size:11px;font-weight:400;opacity:.8">約需 20-40 秒</span>';

  // Show loading
  const overlay = document.getElementById('loading-overlay');
  overlay.style.display = 'flex';
  document.getElementById('loading-bar').style.animation = 'none';
  void document.getElementById('loading-bar').offsetHeight;
  document.getElementById('loading-bar').style.animation = 'progress 35s ease-out forwards';

  let msgIdx = 0;
  const msgEl = document.getElementById('loading-msg');
  msgEl.textContent = MSGS[0];
  const msgTimer = setInterval(() => { msgIdx = (msgIdx + 1) % MSGS.length; msgEl.textContent = MSGS[msgIdx]; }, 3500);

  document.getElementById('error-box').style.display = 'none';

  // Collect form data
  const region = document.getElementById('f-region').value;
  const startDate = document.getElementById('f-start').value;
  const endDate = document.getElementById('f-end').value;
  const arrTime = document.getElementById('f-arr-h').value.padStart(2,'0') + ':' + document.getElementById('f-arr-m').value;
  const depTime = document.getElementById('f-dep-h').value.padStart(2,'0') + ':' + document.getElementById('f-dep-m').value;
  const adults = document.getElementById('f-adults').value;
  const kids = document.getElementById('f-kids').value;
  const members = document.getElementById('f-members').value;
  const requests = document.getElementById('f-requests').value;
  const beenBefore = document.getElementById('f-been').checked;

  const s = new Date(startDate), e = new Date(endDate);
  const days = Math.ceil((e - s) / 86400000) + 1;
  const regLabel = REGIONS[region] || region;
  const isCar = transport === 'car';

  // ── 依天數調整 prompt 複雜度 ──
  const isLong = days > 4;
  const actPerDay = isLong ? '3-4（午餐+1景點+晚餐+1景點）' : '5-7活動含三餐';
  const descLen = isLong ? '5字內' : '10字內';
  const igLen = isLong ? '10字內有emoji' : '1-2句有emoji像網紅';

  const prompt = `你是日本旅遊規劃師+IG網紅。繁體中文。

資訊：區域${regLabel}、${startDate}~${endDate}（${days}天）、抵達${arrTime}離開${depTime}、${adults}大${kids}小（${members}）、${isCar?'自駕':'大眾運輸'}、興趣：${[...selectedInterests].join('/')}${beenBefore?'、深度旅':''}
${requests?'需求：'+requests:''}

回傳純JSON：
{"tripTitle":"標題","overview":"摘要",
"advice":["建議1","建議2"],
"packingList":[{"category":"類","items":["物品"]}],
"itinerary":[{"dayNumber":1,"date":"${startDate}","region":"地區","theme":"主題",
"weather":{"condition":"天氣","temperature":"15~22°C","icon":"sunny"},
"activities":[{"time":"14:00","name":"景點名","description":"${descLen}描述",
"igCaption":"${igLen}","highlights":["亮點"],"type":"SIGHTSEEING",
"coordinates":{"lat":0,"lng":0},
"ticketInfo":{"required":false,"priceEstimate":"免費"},
"reservation":{"needed":false,"tips":""},
"travelToNext":{"mode":"${isCar?'car':'train'}","duration":"15分","distance":"3km"}}]}]}

規則：每天${actPerDay}、第一天從${arrTime}、最後天${depTime}前結束、type=FOOD/SIGHTSEEING/ACTIVITY/HOTEL、餐廳具體店名+推薦菜、FOOD的reservation.needed=true+tips寫訂位方式、description精簡、JSON完整不截斷

座標規則：coordinates 的 lat/lng **絕對不可以是 0/0 或範例值**。每個 activity 都要填它真實的緯度經度（金閣寺=35.0394,135.7292；道頓堀=34.6687,135.5018；清水寺=34.9949,135.7850 諸如此類）。地圖上每個點都應該落在該景點實際位置，不可全部疊在同一處。

去重規則（重要，只針對 type=SIGHTSEEING / FOOD / ACTIVITY / SHOPPING）：整趟 ${days} 天行程中，這些類型的 activity.name **不得重複出現**。同一家拉麵店、同一個神社、同一個市場都不可在不同天出現第二次。連鎖店若真的不同分店，必須在 name 標明分店（例：「一蘭拉麵 道頓堀店」vs「一蘭拉麵 京都八幡店」）。
⚠️ 例外：type=HOTEL 允許連續多天重複出現（旅客住同一家飯店是常態，不算違反去重）。

店名規則（極重要，違反等於任務失敗）：activity.name 必須是 Google Maps 真的查得到的具體店名或景點名。
✅ 合法：「一蘭拉麵 道頓堀店」「金閣寺」「黑門市場」「壽司大」「蟹道樂 道頓堀本店」「東大寺南大門」
❌ 違反（絕對禁止用「類別＋地名」當店名）：「燒鳥屋 梅田店」「京料理 京都店」「關西拉麵 梅田店」「嵐山拉麵 京都店」「燒肉 京都店」「大阪拉麵」「京都壽司」
如果想不到真實的店名，就改推景點（type=SIGHTSEEING）而不是亂編一個聽起來像連鎖的假名字。`;

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    // ── 防止 Render 超時回傳 HTML 錯誤頁面 ──
    const contentType = resp.headers.get('content-type') || '';
    if (!contentType.includes('json')) {
      throw new Error('伺服器回應逾時（Render 免費版限 30 秒）。\n建議：縮短天數至 3-4 天再試。');
    }

    const data = await resp.json();
    if (!data.ok) throw new Error(data.error + (data.preview ? '\n\n預覽: ' + data.preview : ''));

    // 伺服器已嘗試解析 JSON，這裡做最終解析
    let parsed = null;
    const txt = data.text || '';
    
    // 1. 直接解析
    try { parsed = JSON.parse(txt); } catch(_) {}
    
    // 2. 找 {...} 區塊
    if (!parsed) {
      const m = txt.match(/\{[\s\S]*\}/);
      if (m) try { parsed = JSON.parse(m[0]); } catch(_) {}
    }
    
    // 3. 移除 markdown code block
    if (!parsed) {
      const cb = txt.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (cb) try { parsed = JSON.parse(cb[1].trim()); } catch(_) {}
    }
    
    if (!parsed) {
      console.error('AI 原始回應:', txt.substring(0, 1000));
      throw new Error('AI 回應格式錯誤，請重試');
    }

    // ── 驗證行程有實際內容 ──
    if (!parsed.itinerary || !Array.isArray(parsed.itinerary) || parsed.itinerary.length === 0) {
      console.error('AI 回傳 JSON 但缺少行程:', Object.keys(parsed));
      throw new Error('AI 回傳的行程不完整（可能被截斷）。\n建議：縮短天數至 3-4 天再試。');
    }
    
    plan = parsed;
    plan.transportationMode = transport;
    // 用表單天數作為備用
    plan._formDays = days;
    renderResult();
    showResult();
  } catch (err) {
    const msg = err.message || '未知錯誤';
    document.getElementById('error-box').innerHTML = `<span style="font-size:18px">⚠️</span><div><strong>生成失敗：</strong><span style="white-space:pre-wrap">${esc(msg)}</span></div>`;
    document.getElementById('error-box').style.display = 'flex';
  } finally {
    clearInterval(msgTimer);
    overlay.style.display = 'none';
    btn.disabled = false;
    btn.textContent = '🪄 開始規劃旅程';
    isLoading = false;
  }
}

function toggleDay(i) { openDay = openDay === i ? -1 : i; renderTab(); }

// ═══════════════════════════════════════════════════════════════
// 行程編輯（新增/刪除活動）
// ═══════════════════════════════════════════════════════════════
function deleteActivity(dayIdx, actIdx) {
  if (!plan?.itinerary?.[dayIdx]?.activities) return;
  const act = plan.itinerary[dayIdx].activities[actIdx];
  if (!confirm(`確定刪除「${act.name}」？`)) return;
  plan.itinerary[dayIdx].activities.splice(actIdx, 1);
  recalcTimes(dayIdx);
  renderTab();
}

// ── 移動活動（上移/下移）並重新計算時間 ──
function moveActivity(dayIdx, actIdx, direction) {
  const acts = plan?.itinerary?.[dayIdx]?.activities;
  if (!acts) return;
  const newIdx = actIdx + direction;
  if (newIdx < 0 || newIdx >= acts.length) return;
  
  // 交換位置
  [acts[actIdx], acts[newIdx]] = [acts[newIdx], acts[actIdx]];
  
  // 重新分配時間
  recalcTimes(dayIdx);
  renderTab();
}

// ── 重新計算整天的時間分配 ──
function recalcTimes(dayIdx) {
  const acts = plan?.itinerary?.[dayIdx]?.activities;
  if (!acts || acts.length === 0) return;

  // 保留第一個活動的時間作為起點
  let currentMin = timeToMin(acts[0].time);
  if (isNaN(currentMin)) currentMin = 9 * 60; // 預設 09:00

  for (let i = 0; i < acts.length; i++) {
    // 設定這個活動的時間
    acts[i].time = minToTime(currentMin);

    // 估算停留時間（用 travelToNext 的間隔或預設值）
    let stayDuration;
    if (acts[i].type === 'FOOD') {
      stayDuration = 60; // 餐廳 60 分鐘
    } else if (acts[i].type === 'HOTEL') {
      stayDuration = 30; // 飯店 30 分鐘
    } else {
      stayDuration = 90; // 景點 90 分鐘
    }

    // 估算交通時間
    let travelMin = 15; // 預設 15 分鐘
    if (acts[i].travelToNext?.duration) {
      const parsed = parseInt(acts[i].travelToNext.duration);
      if (!isNaN(parsed) && parsed > 0) travelMin = parsed;
    }

    // 下一個活動的開始時間 = 當前 + 停留 + 交通
    if (i < acts.length - 1) {
      currentMin += stayDuration + travelMin;
      // 不要超過 23:00
      if (currentMin > 23 * 60) currentMin = 23 * 60;
    }
  }
}

function timeToMin(t) {
  if (!t) return NaN;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + (m || 0);
}

function minToTime(m) {
  const h = Math.floor(m / 60);
  const mm = m % 60;
  return String(h).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
}

function addActivityToPlan(dayIdx, activity) {
  if (!plan?.itinerary?.[dayIdx]) return;
  const acts = plan.itinerary[dayIdx].activities;
  
  // 自動計算時間：最後一個活動時間 + 1~2 小時
  if (!activity.time && acts.length > 0) {
    const last = acts[acts.length - 1];
    if (last.time) {
      const [h, m] = last.time.split(':').map(Number);
      let nh = h + 1 + Math.floor((m + 30) / 60);
      let nm = (m + 30) % 60;
      if (nh > 22) nh = 22;
      activity.time = String(nh).padStart(2,'0') + ':' + String(nm).padStart(2,'0');
    }
  }
  if (!activity.time) activity.time = '12:00';
  if (!activity.id) activity.id = 'a-' + Date.now() + '-' + Math.random().toString(36).slice(2,5);
  
  acts.push(activity);
  // 按時間排序
  acts.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  closeSuggest();
  renderTab();
}

// 附近景點推薦面板
// ═══════════════════════════════════════════════════════════════
let sugDayIdx = -1;
let sugCategory = 'FOOD';
let sugData = [];
let sugLoading = false;

function openSuggest(dayIdx) {
  sugDayIdx = dayIdx;
  sugCategory = 'FOOD';
  sugData = [];
  renderSuggest();
  document.body.style.overflow = 'hidden';
  fetchSuggestions();
}

function closeSuggest() {
  const el = document.getElementById('sug-modal');
  if (el) el.remove();
  document.body.style.overflow = '';
}

function setSugCat(cat) {
  sugCategory = cat;
  sugData = [];
  renderSuggest();
  fetchSuggestions();
}

async function fetchSuggestions() {
  if (!plan?.itinerary?.[sugDayIdx]) return;
  sugLoading = true;
  renderSuggest();

  const day = plan.itinerary[sugDayIdx];
  const lastAct = day.activities?.[day.activities.length - 1];
  // 蒐集整趟行程所有活動名稱，避免推薦到其他天已有的景點
  const existingNames = (plan.itinerary || [])
    .flatMap(d => d.activities?.map(a => a.name) || [])
    .filter(Boolean);

  try {
    const resp = await fetch('/api/suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        region: day.region,
        category: sugCategory,
        lat: lastAct?.coordinates?.lat,
        lng: lastAct?.coordinates?.lng,
        existingNames,
        date: day.date,
      }),
    });
    const data = await resp.json();
    sugData = data.ok ? (data.suggestions || []) : [];
  } catch (e) {
    sugData = [];
  }
  sugLoading = false;
  renderSuggest();
}

function renderSuggest() {
  let el = document.getElementById('sug-modal');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sug-modal';
    document.body.appendChild(el);
  }

  const day = plan?.itinerary?.[sugDayIdx];
  const cats = [
    ['FOOD','🍱 美食'],['SIGHTSEEING','⛩️ 觀光'],['ACTIVITY','🎯 體驗'],['SHOPPING','🛍️ 購物']
  ];

  let h = `<div class="sug-overlay" onclick="closeSuggest()">
    <div class="sug-panel" onclick="event.stopPropagation()">
      <div class="sug-header">
        <h3>📍 新增景點 — Day ${day?.dayNumber || ''} ${esc(day?.region||'')}</h3>
        <button class="sug-close" onclick="closeSuggest()">✕</button>
      </div>
      <div class="sug-tabs">
        ${cats.map(([k,l]) => `<div class="sug-tab ${sugCategory===k?'on':''}" onclick="setSugCat('${k}')">${l}</div>`).join('')}
      </div>
      <div class="sug-body">`;

  if (sugLoading) {
    h += `<div class="sug-loading">
      <div style="font-size:28px;margin-bottom:8px">🔍</div>
      正在搜尋附近${cats.find(c=>c[0]===sugCategory)?.[1]||'景點'}...<br>
      <span style="font-size:11px;color:#94a3b8">AI 推薦約需 5-10 秒</span>
    </div>`;
  } else if (sugData.length === 0) {
    h += `<div class="sug-loading">暫無推薦結果<br><span style="font-size:11px;color:#94a3b8">可嘗試其他分類或手動新增</span></div>`;
  } else {
    sugData.forEach((s, i) => {
      const stayStr = s.estimatedStay || '';
      h += `<div class="sug-card" onclick='pickSuggestion(${i})'>
        <div class="sug-card-name">${esc(s.name)} ${stayStr ? `<span style="font-size:10px;color:#0369a1;background:#e0f2fe;border-radius:6px;padding:1px 6px;margin-left:4px">⏱${esc(stayStr)}</span>` : ''}</div>
        <div class="sug-card-desc">${esc(s.description||'')}</div>
        ${s.igCaption ? `<div class="sug-card-ig">📸 ${esc(s.igCaption)}</div>` : ''}
        <div class="sug-card-meta">
          ${(s.highlights||[]).map(hl=>`<span class="sug-card-tag">${esc(hl)}</span>`).join('')}
        </div>
      </div>`;
    });
  }

  h += `</div>
      <!-- 手動新增 -->
      <div class="sug-manual">
        <div class="sug-manual-title">✏️ 手動新增</div>
        <div class="sug-manual-row">
          <input class="sug-manual-inp" id="sug-manual-time" type="time" style="width:90px;flex:none" value="12:00">
          <input class="sug-manual-inp" id="sug-manual-name" placeholder="景點名稱">
          <select class="sug-manual-inp" id="sug-manual-type" style="width:80px;flex:none">
            ${cats.map(([k,l])=>`<option value="${k}">${l}</option>`).join('')}
          </select>
          <button class="sug-manual-btn" onclick="manualAdd()">新增</button>
        </div>
      </div>
    </div>
  </div>`;

  el.innerHTML = h;
}

function pickSuggestion(idx) {
  const s = sugData[idx];
  if (!s) return;
  addActivityToPlan(sugDayIdx, {
    name: s.name,
    description: s.description || '',
    type: s.type || sugCategory,
    igCaption: s.igCaption || '',
    highlights: s.highlights || [],
    coordinates: s.coordinates || null,
    estimatedStay: s.estimatedStay || '',
    ticketInfo: { required: false, priceEstimate: '—', tips: '' },
    reservation: s.type === 'FOOD' || sugCategory === 'FOOD' ? { needed: true, tips: '建議透過 Tabelog 預約' } : { needed: false },
  });
}

function manualAdd() {
  const time = document.getElementById('sug-manual-time')?.value || '12:00';
  const name = document.getElementById('sug-manual-name')?.value?.trim();
  const type = document.getElementById('sug-manual-type')?.value || 'SIGHTSEEING';
  if (!name) { alert('請輸入景點名稱'); return; }
  addActivityToPlan(sugDayIdx, {
    time,
    name,
    description: '',
    type,
    highlights: [],
    ticketInfo: { required: false, priceEstimate: '—' },
  });
}

// ═══════════════════════════════════════════════════════════════
// 自動取得即時匯率
// ═══════════════════════════════════════════════════════════════
let liveRate = 0.21;

async function fetchLiveRate() {
  try {
    const resp = await fetch('/api/rate');
    const data = await resp.json();
    if (data.ok && data.rate > 0) {
      liveRate = data.rate;
      // 更新記帳面板匯率
      const rateEl = document.getElementById('exp-rate');
      if (rateEl) rateEl.value = liveRate;
      // 更新匯率小工具
      const curRate = document.getElementById('cur-rate');
      if (curRate) curRate.value = liveRate;
      console.log(`[匯率] JPY→TWD = ${liveRate}`);
    }
  } catch (_) {}
}

// 頁面載入時自動取匯率
fetchLiveRate();

// 記帳面板的匯率更新按鈕
async function refreshRateExp(btn) {
  const orig = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    const resp = await fetch('/api/rate');
    const data = await resp.json();
    if (data.ok && data.rate > 0) {
      document.getElementById('exp-rate').value = data.rate;
      renderExpenses();
      const curRate = document.getElementById('cur-rate');
      if (curRate) { curRate.value = data.rate; calcCurrency(); }
      btn.textContent = '✅';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    } else {
      btn.textContent = '❌';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }
  } catch (_) {
    btn.textContent = '❌';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }
  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════════════
// 記帳功能
// ═══════════════════════════════════════════════════════════════
const CAT_META = {
  food:      { label: '餐飲', emoji: '🍱', bg: '#fff7ed', color: '#c2410c', border: '#fed7aa' },
  transport: { label: '交通', emoji: '🚄', bg: '#eff6ff', color: '#1d4ed8', border: '#bfdbfe' },
  shopping:  { label: '購物', emoji: '🛍️', bg: '#fdf2f8', color: '#be185d', border: '#fbcfe8' },
  hotel:     { label: '住宿', emoji: '🏨', bg: '#f5f3ff', color: '#6d28d9', border: '#ddd6fe' },
  ticket:    { label: '門票', emoji: '🎫', bg: '#ecfdf5', color: '#047857', border: '#a7f3d0' },
  other:     { label: '其他', emoji: '📦', bg: '#f8fafc', color: '#475569', border: '#e2e8f0' },
};

let expenses = [];
let expOpen = false;

// 載入 localStorage
(function loadExpenses() {
  try {
    const saved = localStorage.getItem('jp_expenses');
    if (saved) expenses = JSON.parse(saved);
  } catch(_) {}
  updateBadge();
})();

function saveExpenses() {
  localStorage.setItem('jp_expenses', JSON.stringify(expenses));
  updateBadge();
}

function updateBadge() {
  const badge = document.getElementById('exp-badge');
  if (expenses.length > 0) {
    badge.style.display = 'flex';
    badge.textContent = expenses.length;
  } else {
    badge.style.display = 'none';
  }
}

function toggleExpPanel() {
  expOpen = !expOpen;
  document.getElementById('exp-panel').classList.toggle('open', expOpen);
  document.getElementById('exp-overlay').classList.toggle('open', expOpen);
  if (expOpen) renderExpenses();
}

function addExpense() {
  const amtEl = document.getElementById('exp-amount');
  const catEl = document.getElementById('exp-cat');
  const noteEl = document.getElementById('exp-note');
  const amt = parseInt(amtEl.value);
  if (!amt || amt <= 0) return;

  const rate = parseFloat(document.getElementById('exp-rate').value) || 0.21;

  expenses.unshift({
    id: Date.now() + '-' + Math.random().toString(36).slice(2,6),
    date: Date.now(),
    jpy: amt,
    twd: Math.round(amt * rate),
    cat: catEl.value,
    note: noteEl.value || CAT_META[catEl.value]?.label || '支出',
  });

  saveExpenses();
  renderExpenses();

  // 清空表單
  amtEl.value = '';
  noteEl.value = '';
  amtEl.focus();
}

function deleteExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  saveExpenses();
  renderExpenses();
}

function clearAllExpenses() {
  if (!confirm('確定要清除所有記帳紀錄嗎？')) return;
  expenses = [];
  saveExpenses();
  renderExpenses();
}

function renderExpenses() {
  const rate = parseFloat(document.getElementById('exp-rate').value) || 0.21;
  const totalJPY = expenses.reduce((a, e) => a + e.jpy, 0);
  const totalTWD = Math.round(totalJPY * rate);

  document.getElementById('exp-total-jpy').textContent = '¥' + totalJPY.toLocaleString();
  document.getElementById('exp-total-twd').textContent = '≈ NT$' + totalTWD.toLocaleString();

  const listEl = document.getElementById('exp-list');
  if (expenses.length === 0) {
    listEl.innerHTML = '<div class="exp-empty">還沒有記帳紀錄 📝<br>開始記錄旅行花費吧！</div>';
    return;
  }

  // 分類統計
  const catTotals = {};
  expenses.forEach(e => { catTotals[e.cat] = (catTotals[e.cat] || 0) + e.jpy; });

  let h = '';

  // 分類統計條
  h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  Object.entries(catTotals).sort((a,b) => b[1] - a[1]).forEach(([cat, total]) => {
    const m = CAT_META[cat] || CAT_META.other;
    const pct = totalJPY > 0 ? Math.round(total / totalJPY * 100) : 0;
    h += `<div style="background:${m.bg};border:1px solid ${m.border};border-radius:8px;padding:5px 10px;font-size:11px;color:${m.color};font-weight:600">
      ${m.emoji} ${m.label} ¥${total.toLocaleString()} (${pct}%)
    </div>`;
  });
  h += '</div>';

  // 明細列表
  expenses.forEach(e => {
    const m = CAT_META[e.cat] || CAT_META.other;
    const dateStr = new Date(e.date).toLocaleDateString('zh-TW', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    h += `<div class="exp-item">
      <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1">
        <span class="exp-cat" style="background:${m.bg};color:${m.color};border:1px solid ${m.border}">${m.emoji} ${m.label}</span>
        <div style="min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.note)}</div>
          <div style="font-size:10px;color:var(--fg4)">${dateStr}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:800;color:var(--fg);font-family:var(--mono)">¥${e.jpy.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--fg4);font-family:var(--mono)">NT$${Math.round(e.jpy * rate).toLocaleString()}</div>
        </div>
        <button class="exp-del" onclick="deleteExpense('${e.id}')" title="刪除">🗑️</button>
      </div>
    </div>`;
  });

  // 清除全部按鈕
  if (expenses.length >= 2) {
    h += `<button onclick="clearAllExpenses()" style="margin-top:12px;width:100%;padding:8px;border-radius:8px;
      border:1px solid #fecaca;background:#fef2f2;color:#dc2626;font-size:12px;font-weight:600;cursor:pointer">
      🗑️ 清除全部紀錄</button>`;
  }

  listEl.innerHTML = h;
}
</script>
